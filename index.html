<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gizmo AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-controls">
            <button id="toggle-sidebar-btn" title="Toggle Sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </button>
            <button id="new-chat-btn" title="New Chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span class="new-chat-text">New Chat</span>
            </button>
        </div>
        <div id="history-list">
            <!-- Chat items will be injected here -->
        </div>
    </div>
    
    <div id="sidebar-overlay"></div>

    <div id="main-content">
        <header>
            <button id="menu-btn" title="Open sidebar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1>Gizmo</h1>
        </header>

        <div id="chat-container">
            <div id="welcome-screen">
                <h2>Gizmo</h2>
                <p>How can I help you today?</p>
            </div>
            
            <div id="chat-log">
                <div id="scroll-anchor"></div>
            </div>
        </div>

        <div id="input-area">
            <div id="file-preview-container"></div>
            <form id="chat-form">
                <input type="file" id="file-input" hidden accept="image/*,application/pdf,text/plain">
                
                <button type="button" id="upload-button" aria-label="Attach file">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 13H5v-2h6V5h2v6h6v2h-6v6h-2v-6z"/></svg>
                </button>

                <div class="settings-wrapper">
                    <button type="button" id="settings-button" aria-label="Settings">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.68 8.91c-.13.23-.07.52.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    </button>
                    <div id="settings-menu">
                        <div class="settings-row">
                            <span class="settings-label">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27-7.38 5.74zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z"/></svg>
                                <span>Model</span>
                            </span>
                            <select id="model-select" class="settings-input">
                                <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
                                <option value="gemma-3-27b-it">Gemma 3 27B</option>
                                <option value="gemma-3-12b-it">Gemma 3 12B</option>
                                <option value="gemma-3-4b-it">Gemma 3 4B</option>
                                <option value="gemma-3-2b-it">Gemma 3 2B</option>
                                <option value="gemma-3-1b-it">Gemma 3 1B</option>
                            </select>
                        </div>
                        <div class="settings-row">
                            <span class="settings-label">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                                <span>Memory</span>
                            </span>
                            <select id="history-limit-select" class="settings-input">
                                <option value="4">Last 4 Msgs</option>
                                <option value="10">Last 10 Msgs</option>
                                <option value="20">Last 20 Msgs</option>
                                <option value="0">All (High Cost)</option>
                            </select>
                        </div>
                        <div class="settings-row">
                            <span class="settings-label">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                                <span>API Key</span>
                            </span>
                            <input type="password" id="api-key-input" class="settings-input" placeholder="Your API Key">
                        </div>
                        <div id="toggle-theme-button" class="settings-row" role="button" tabindex="0">
                             <span class="settings-label">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.64-.11 2.4-.31-.31-.81-.49-1.7-.49-2.69 0-2.76 2.24-5 5-5 .99 0 1.88.18 2.69.49.2-.76.31-1.57.31-2.4 0-4.97-4.03-9-9-9z"/></svg>
                                <span>Toggle Theme</span>
                            </span>
                        </div>
                        <div id="clear-chat-button" class="settings-row" role="button" tabindex="0">
                             <span class="settings-label">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                                <span>Clear Chat</span>
                            </span>
                        </div>
                    </div>
                </div>

                <input type="text" id="user-input" placeholder="Message..." autocomplete="off">
                
                <button type="submit" aria-label="Send message" id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
                </button>
            </form>
            <div id="token-display-area">
                <span>Tokens Used: <span id="total-tokens-value">0</span></span>
                <span>Gizmo can make mistakes. Check important info.</span>
            </div>
        </div>
    </div>

    <div id="image-modal" class="hidden">
        <span id="close-modal">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </span>
        <img id="enlarged-image" src="" alt="Enlarged view">
    </div>

    <script src="script.js"></script>
</body>
</html>
